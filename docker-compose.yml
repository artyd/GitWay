# Розгортання GitШлях: Postgres (спільний прогрес + рейтинг) + застосунок.
# Запуск:  docker compose up -d --build
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gitway
      POSTGRES_PASSWORD: gitway        # ЗМІНІТЬ на проді
      POSTGRES_DB: gitway
    volumes:
      - gitway-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitway"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    environment:
      # Схема таблиць створюється автоматично при першому запиті.
      DATABASE_URL: postgres://gitway:gitway@db:5432/gitway
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  gitway-db:
